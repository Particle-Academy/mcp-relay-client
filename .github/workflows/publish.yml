name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) — no token. The package was bootstrapped with a
      # one-time NPM_TOKEN; configure the Trusted Publisher on npmjs.com
      # (Particle-Academy/mcp-relay-client → publish.yml) and revoke that token so
      # every release ships via OIDC. OIDC needs npm 11.5+; the runner ships npm 10,
      # so publish via a fresh npm.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
